<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Food Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="./style/main.css">

<link rel="icon" type="image/png" href="./images/Himalchuli_Logo.png">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#fff7ed;
  color:#111827;
}

/* WRAPPER */
.container{
  width:min(950px,92%);
  margin:auto;
  padding:20px 0 40px;
}

/* HERO (smaller + cleaner) */
.hero{
  position:relative;
}

.hero-image-wrapper{
  width:100%;
  height:70vh;
  border-radius:22px;
  overflow:hidden;
  position:relative;
  box-shadow:0 15px 35px rgba(0,0,0,0.12);
}

.hero-image{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.4s;
}

.hero-image-wrapper:hover .hero-image{
  transform:scale(1.04);
}

.hero-gradient{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.55), transparent);
}

.floating-card{
  position:absolute;
  bottom:12px;
  left:12px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  color:white;
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:500;
}

/* DETAILS (compact) */
.details-card{
  background:white;
  margin-top:-35px;
  border-radius:22px;
  padding:22px;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
  position:relative;
}

/* TOP ROW */
.top-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.tag{
  background:#f97316;
  color:white;
  padding:5px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:600;
}

.rating{
  font-size:12px;
  color:#f97316;
  font-weight:600;
}

.rating span{
  color:#6b7280;
  font-weight:400;
  font-size:11px;
}

/* TITLE (SMALLER NOW) */
h1{
  font-size:22px;
  font-weight:600;
  margin-bottom:8px;
}

/* META */
.meta{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:10px;
}

.meta-item{
  background:#fff7ed;
  border:1px solid #fed7aa;
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  color:#f97316;
}

/* PRICE */
.price{
  font-size:24px;
  font-weight:700;
  color:#f97316;
  margin:8px 0 10px;
}

/* DESCRIPTION (compact) */
.description{
  font-size:13px;
  color:#4b5563;
  line-height:1.5;
  margin-bottom:15px;
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:12px;
  text-align:center;
  text-decoration:none;
  font-weight:600;
  font-size:13px;
  transition:0.3s;
}

.primary{
  background:linear-gradient(135deg,#f97316,#ea580c);
  color:white;
}

.primary:hover{
  transform:translateY(-2px);
}

.secondary{
  background:white;
  border:1px solid #fdba74;
  color:#f97316;
}

.secondary:hover{
  background:#fff7ed;
}

/* MOBILE */
@media(max-width:768px){

.hero-image-wrapper{
  height:35vh;
}

.details-card{
  padding:18px;
}

h1{
  font-size:20px;
}

.price{
  font-size:22px;
}

}
</style>
</head>

<body>
  <nav class="navbar">

  <div class="nav-logo">

    <img 
      src="./images/Himalchuli_Logo.png" 
      alt="Himalchuli Logo"
    >

    <div class="logo-text">
    <h2>HIMALCHULI BAR & GRILL</h2>
    <span>NEPALESE & INDIAN CUISINE</span>
  </div>

  </div>

<div class="nav-toggle" id="navToggle">
  ☰
</div>

<ul class="nav-links" id="navLinks">
  <li><a href="#about">About</a></li>
  <li><a href="#menu">Menu</a></li>
  <li><a href="#chefs">Chefs</a></li>
  <li><a href="#gallery">Gallery</a></li>
  <li><a href="#contact">Contact</a></li>
</ul>

</nav>

<div id="foodDetails"></div>

<script>
const params = new URLSearchParams(window.location.search);
const foodId = params.get("id");

fetch("menu.json")
.then(res => res.json())
.then(data => {

  let selectedFood = null;

  data.forEach(section => {
    section.items.forEach(item => {
      if(item.id == foodId){
        selectedFood = item;
      }
    });
  });

  if(selectedFood){
const image =
  selectedFood.image
    ? `./images/${selectedFood.image}`
    : "https://images.unsplash.com/photo-1544025162-d76694265947";
    const description = selectedFood.description || "Delicious dish made with fresh ingredients and authentic spices.";

    document.getElementById("foodDetails").innerHTML = `
      <div class="container">

        <div class="hero">
          <div class="hero-image-wrapper">

            <img  src="${image}"  class="hero-image"
              onerror="this.src='https://images.unsplash.com/photo-1544025162-d76694265947'"
            >

            <div class="hero-gradient"></div>
            <div class="floating-card">Himalchuli Special</div>

          </div>
        </div>

        <div class="details-card">

          <div class="top-row">
            <div class="tag">Chef Choice</div>
            <div class="rating">⭐ 4.8 <span>(120+)</span></div>
          </div>

          <h1>${selectedFood.name}</h1>

          <div class="meta">
            <div class="meta-item">🍽 Fresh</div>
            <div class="meta-item">⏱ 20-30 min</div>
            <div class="meta-item">🔥 Popular</div>
          </div>

          <div class="price">$${selectedFood.price}</div>

          <div class="description">${description}</div>

          <div class="buttons">
            <a href="index.html" class="btn secondary">Back</a>
            <a href="#" class="btn primary">Order</a>
          </div>

        </div>

      </div>
    `;
  }
});
</script>

</body>
</html>
